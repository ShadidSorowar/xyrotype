<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | My Blog</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #2d3436;
            --accent: #0984e3; /* Nice blue color */
            --border: #dfe6e9;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.7;
            max-width: 750px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* The Title Style */
        h1 { 
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            color: #000;
        }

        /* Post Content Styling */
        .post-content {
            font-size: 1.1rem;
            margin-bottom: 60px;
        }

        /* Links */
        a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.7; text-decoration: underline; }

        /* A subtle separator before comments */
        hr {
            border: 0;
            height: 1px;
            background: var(--border);
            margin: 50px 0;
        }

        /* Simple Navigation (Optional) */
        nav {
            margin-bottom: 40px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
        nav a { margin-right: 15px; color: #636e72; }
    </style>
</head>
<body>

    <nav>
        <a href="/xyrotype">Home</a>
    </nav>

    {{ content }}

</body>
</html>
